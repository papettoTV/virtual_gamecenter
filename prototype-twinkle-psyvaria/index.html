<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Graze Duel Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">Virtual Arcade Prototype</p>
        <h1>Graze Duel</h1>
        <p>
          対戦型縦スクロール弾幕かすりゲームの試作です。敵弾をギリギリで避けてコンボを伸ばし、溜めたゲージで相手側に弾幕を送り込みます。
        </p>
      </section>

      <section class="hud">
        <div>
          <strong>操作</strong>
          <span>移動: 矢印キー / WASD</span>
          <span>攻撃: ゲージが溜まると自動発射</span>
          <span>低速移動: Shift</span>
          <span>一時停止: Space</span>
          <span>リスタート: R</span>
        </div>
        <div>
          <strong>評価ポイント</strong>
          <span>攻撃すると相手は危険になるが、かすりコンボもしやすくなる</span>
          <span>連続かすりで倍率が上がる</span>
        </div>
      </section>

      <div class="game-frame">
        <canvas id="game" width="960" height="640" aria-label="Graze Duel game canvas"></canvas>
      </div>

      <div class="touch-controls" aria-label="スマホ操作">
        <div class="touch-actions">
          <button id="touch-restart" class="touch-button" type="button">リスタート</button>
          <button id="touch-pause" class="touch-button" type="button">一時停止</button>
        </div>
      </div>

      <section class="ranking-panel">
        <div class="ranking-submit" id="ranking-submit-panel">
          <h2>ランキング登録</h2>
          <p id="ranking-result">クリアするとタイムを登録できます。</p>
          <div class="ranking-form">
            <input id="ranking-name" maxlength="24" placeholder="名前" autocomplete="nickname" />
            <button id="ranking-submit" type="button" disabled>登録</button>
          </div>
        </div>
        <div class="ranking-list">
          <h2>クリアタイムランキング</h2>
          <ol id="ranking-list"></ol>
          <button id="ranking-refresh" type="button">更新</button>
        </div>
      </section>
    </main>
    <script type="module" src="./game.js"></script>
  </body>
</html>
